---
- name: Generic Package Update
  hosts: "{{ HOSTS }}"
  become: yes
  gather_facts: yes

  tasks:

    - name: Update package to latest (Debian)
      apt:
        name: "{{ PACKAGE }}"
        state: latest
        update_cache: yes
      when:
        - ansible_os_family == "Debian"
        - VERSION == "" or VERSION == "latest"

    - name: Update package to latest (RedHat)
      package:
        name: "{{ PACKAGE }}"
        state: latest
      when:
        - ansible_os_family == "RedHat"
        - VERSION == "" or VERSION == "latest"

    - name: Install specific version (Debian)
      apt:
        name: "{{ PACKAGE }}={{ VERSION }}"
        state: present
        allow_downgrade: yes
        update_cache: yes
      when:
        - ansible_os_family == "Debian"
        - VERSION != ""
        - VERSION != "latest"

    - name: Install specific version (RedHat)
      dnf:
        name: "{{ PACKAGE }}-{{ VERSION }}"
        state: present
        allow_downgrade: yes
      when:
        - ansible_os_family == "RedHat"
        - VERSION != ""
        - VERSION != "latest"

    - name: Gather package facts
      package_facts:

    - name: Show installed package version
      debug:
        var: ansible_facts.packages[PACKAGE]
